<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Premium Gradient Background -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" /> <!-- Indigo -->
      <stop offset="50%" stop-color="#6366f1" /> <!-- Soft Violet -->
      <stop offset="100%" stop-color="#f43f5e" /> <!-- Rose Pink -->
    </linearGradient>
    <!-- Soft Drop Shadow for Inner Symbols -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1e1b4b" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- iOS-style Rounded Background -->
  <rect width="512" height="512" rx="120" fill="url(#iconGrad)" />

  <!-- Outer subtle glowing ring -->
  <rect x="16" y="16" width="480" height="480" rx="104" fill="none" stroke="#ffffff" stroke-width="4" stroke-opacity="0.15" />

  <!-- Combined Visual Element: Play Button + Checkmark -->
  <g filter="url(#dropShadow)" transform="translate(256, 256)">
    <!-- Main YouTube Style Play Outer Triangle, rotated slightly for dynamic look -->
    <path d="M-110,-130 L130,0 L-110,130 Z" fill="#ffffff" />
    
    <!-- Bold checkmark indicating task completion / planning success, overlaid in front -->
    <path d="M-40,20 L10,70 L140,-40" fill="none" stroke="#f43f5e" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M-40,20 L10,70 L140,-40" fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Sparkle Stars representing YouTube growth/optimization -->
  <!-- Top Right Sparkle -->
  <path d="M380,100 Q400,100 400,80 Q400,100 420,100 Q400,100 400,120 Q400,100 380,100 Z" fill="#fef08a" /> <!-- Yellow Glow -->
  <!-- Left Bottom Sparkle -->
  <path d="M90,380 Q110,380 110,360 Q110,380 130,380 Q110,380 110,400 Q110,380 90,380 Z" fill="#fef08a" />
</svg>
